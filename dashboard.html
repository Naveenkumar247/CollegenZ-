<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CollegenZ - Internship Hub Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Clean CSS carousel transitions */
    .carousel-track {
      display: flex;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="min-h-screen bg-[#f4f6f9] text-slate-800 flex flex-col items-center justify-center p-0 sm:p-4 font-sans antialiased selection:bg-[#228B22] selection:text-white">

  <div class="w-full max-w-md bg-white border border-slate-200 sm:rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col h-screen sm:h-[820px] relative">
    
    <div id="loadingScreen" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center gap-3">
      <i data-lucide="loader-2" class="animate-spin text-[#228B22] w-10 h-10"></i>
      <p class="text-sm text-slate-500 font-medium tracking-wide">Syncing Workspace Profiles...</p>
    </div>

    <div id="errorScreen" class="absolute inset-0 bg-white z-50 hidden flex flex-col items-center justify-center px-6 text-center gap-4">
      <i data-lucide="alert-circle" class="text-rose-500 w-12 h-12"></i>
      <p id="errorMessage" class="text-sm text-slate-600 font-medium">Failed to connect to data cluster.</p>
    </div>

    <header class="px-5 pt-5 pb-4 flex justify-between items-center bg-[#228B22] text-white shadow-md shrink-0">
      <div class="flex flex-col">
        <h1 class="text-2xl font-black tracking-tight flex items-center gap-1.5">CollegenZ</h1>
        <span id="userEmailBadge" class="text-[10px] text-emerald-100/90 max-w-[200px] truncate font-medium mt-0.5">session: active_user</span>
      </div>
      <div class="flex items-center gap-3.5">
        <button class="hover:opacity-80 transition cursor-pointer p-1 relative">
          <i data-lucide="bell" class="w-5.5 h-5.5"></i>
          <span class="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full"></span>
        </button>
        <img 
          id="userAvatar"
          src="https://collegenz.in/uploads/profilepic.jpg" 
          alt="Avatar" 
          class="w-9 h-9 rounded-full object-cover border-2 border-white/20 shadow-sm"
        />
      </div>
    </header>

    <div class="px-5 py-3.5 flex justify-between items-center bg-white border-b border-slate-100 shrink-0">
      <div>
        <h2 id="dashboardRoleTitle" class="text-xs font-bold text-slate-400 uppercase tracking-wider">Loading...</h2>
        <p id="parallelTrackCount" class="text-sm font-black text-slate-800 mt-0.5">Active Tracks: 0 of 0</p>
      </div>
      
      <button id="mentorActionBtn" class="hidden bg-[#228B22] hover:bg-emerald-700 text-white text-xs font-bold px-3 py-1.5 rounded-xl transition cursor-pointer flex items-center gap-1 shadow-sm">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
        <span>Add Intern</span>
      </button>
    </div>

    <main class="flex-1 px-4 py-6 overflow-y-auto no-scrollbar flex flex-col justify-center bg-slate-50 relative">
      
      <div id="swipeArena" class="w-full overflow-hidden rounded-3xl relative">
        <div id="carouselTrack" class="carousel-track">
          </div>
      </div>

      <div id="carouselControls" class="flex justify-between items-center mt-6 px-2 hidden">
        <button id="prevBtn" class="p-2.5 rounded-xl bg-white border border-slate-200/80 text-slate-600 hover:bg-slate-50 transition cursor-pointer shadow-sm">
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>
        
        <div id="dotIndicators" class="flex gap-2 items-center"></div>

        <button id="nextBtn" class="p-2.5 rounded-xl bg-white border border-slate-200/80 text-slate-600 hover:bg-slate-50 transition cursor-pointer shadow-sm">
          <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
      </div>

    </main>

    <div class="text-center py-2.5 text-[11px] font-medium tracking-wide text-slate-400 bg-white border-t border-slate-100 shrink-0">
      Socialize with our <span class="font-extrabold text-[#228B22]">CollegenZ</span>
    </div>

    <nav class="bg-[#090d16] text-white grid grid-cols-4 pb-6 pt-3.5 text-center relative z-10 shadow-xl shrink-0">
      <button class="flex flex-col items-center justify-center gap-1.5 text-emerald-400 font-bold transition cursor-pointer">
        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
        <span class="text-[10px] tracking-wide">Dashboard</span>
      </button>
      
      <button class="flex flex-col items-center justify-center gap-1.5 text-slate-400 hover:text-white transition cursor-pointer" onclick="window.location.href='/messages'">
        <i data-lucide="message-square" class="w-5 h-5"></i>
        <span class="text-[10px] tracking-wide">Chat</span>
      </button>
      
      <button class="flex flex-col items-center justify-center gap-1.5 text-slate-400 hover:text-white transition cursor-pointer">
        <i data-lucide="check-square" class="w-5 h-5"></i>
        <span class="text-[10px] tracking-wide">Tasks</span>
      </button>
      
      <button class="flex flex-col items-center justify-center gap-1.5 text-slate-400 hover:text-white transition cursor-pointer">
        <i data-lucide="video" class="w-5 h-5"></i>
        <span class="text-[10px] tracking-wide leading-tight">Meetings</span>
      </button>
    </nav>

  </div>

  <div id="addInternModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl border border-slate-100 overflow-hidden transform scale-95 transition-transform duration-300">
      <header class="bg-[#228B22] text-white p-4 flex justify-between items-center">
        <h3 class="font-bold text-lg flex items-center gap-2">
          <i data-lucide="user-plus" class="w-5 h-5"></i>
          <span>Assign Internship Track</span>
        </h3>
        <button id="closeModalBtn" class="text-white/80 hover:text-white cursor-pointer p-1">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </header>
      
      <form id="addInternForm" class="p-5 space-y-3 max-h-[550px] overflow-y-auto no-scrollbar">
        <div>
          <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Target Account Email</label>
          <input type="email" id="internEmail" required class="w-full border border-slate-200 bg-slate-50 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[#228B22]" placeholder="intern@example.com">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Company Host Name</label>
          <input type="text" id="compName" required class="w-full border border-slate-200 bg-slate-50 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[#228B22]" placeholder="e.g. CodeAlpha">
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Start Date</label>
            <input type="text" id="sDate" required class="w-full border border-slate-200 bg-slate-50 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-[#228B22]" placeholder="DD.MM.YYYY">
          </div>
          <div>
            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">End Date</label>
            <input type="text" id="eDate" required class="w-full border border-slate-200 bg-slate-50 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-[#228B22]" placeholder="DD.MM.YYYY">
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2">
          <div>
            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Total Tasks</label>
            <input type="number" id="totTask" value="4" class="w-full border border-slate-200 bg-slate-50 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[#228B22]">
          </div>
          <div>
            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Assigned</label>
            <input type="number" id="asgnTask" value="2" class="w-full border border-slate-200 bg-slate-50 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[#228B22]">
          </div>
          <div>
            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Pending</label>
            <input type="number" id="pendTask" value="2" class="w-full border border-slate-200 bg-slate-50 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[#228B22]">
          </div>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Mentor Identifier Name</label>
          <input type="text" id="mentName" required class="w-full border border-slate-200 bg-slate-50 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[#228B22]" placeholder="e.g. Amir">
        </div>
        
        <button type="submit" class="w-full mt-2 py-2.5 bg-[#228B22] hover:bg-emerald-700 text-white rounded-xl font-bold text-sm tracking-wide shadow-md transition-all cursor-pointer">
          Deploy Track Profile
        </button>
      </form>
    </div>
  </div>

  <script>
    let appState = {
      zrole: 'intern',
      metricsList: [],
      activeIndex: 0
    };

    const urlParams = new URLSearchParams(window.location.search);
    let targetUserId = urlParams.get('id') || localStorage.getItem('userId');

    if (!targetUserId) {
      targetUserId = "65f123456789abcdef012345"; 
    }

    const BACKEND_API_URL = `/api/dashboard/${targetUserId}`;

    function updateIcons() {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }

    async function fetchDashboardData() {
      try {
        const response = await fetch(BACKEND_API_URL);
        if (!response.ok) throw new Error("Fault response returned by API connection.");
        
        const resData = await response.json();
        
        // Dynamic payload validation wrapper
        const data = resData.data || resData;

        document.getElementById('userAvatar').src = data.picture || "https://collegenz.in/uploads/profilepic.jpg";
        document.getElementById('userEmailBadge').innerText = data.email || "session: active_user";
        
        // ✅ FIXED ROLE COMPILATION PARSER
        const assignedRole = data.zrole || resData.zrole || 'intern';
        appState.zrole = assignedRole.toLowerCase().trim();
        
        if (appState.zrole === 'mentor') {
          document.getElementById('mentorActionBtn').classList.remove('hidden');
          document.getElementById('dashboardRoleTitle').innerText = "Mentor Workspace";
        } else {
          document.getElementById('mentorActionBtn').classList.add('hidden');
          document.getElementById('dashboardRoleTitle').innerText = "Intern Workspace";
        }

        if (!data.metricsList || data.metricsList.length === 0) {
          appState.metricsList = [{
            companyName: "CollegenZ Workspace",
            status: "PENDING SETUP",
            startDate: "Awaiting approval",
            endDate: "Awaiting approval",
            deadlineDate: "N/A",
            progress: 15,
            noOfTask: 0,
            noOfCompletedTask: 0,
            noOfPendingTask: 0,
            nameOfMentor: "System Admin",
            noOfStudents: 0, noOfTaskAssigned: 0, noOfTaskPending: 0
          }];
        } else {
          appState.metricsList = data.metricsList;
        }

        appState.activeIndex = 0;
        document.getElementById('loadingScreen').classList.add('hidden');
        renderCarouselTracks();
        
      } catch (err) {
        console.error(err);
        showError("Backend connection error. Verify dashboard metrics structure.");
      }
    }

    function showError(msg) {
      document.getElementById('loadingScreen').classList.add('hidden');
      const errScreen = document.getElementById('errorScreen');
      document.getElementById('errorMessage').innerText = msg;
      errScreen.classList.remove('hidden');
      updateIcons();
    }

    function renderCarouselTracks() {
      const track = document.getElementById('carouselTrack');
      const isIntern = appState.zrole === 'intern';
      
      document.getElementById('parallelTrackCount').innerText = `Active Tracks: ${appState.activeIndex + 1} of ${appState.metricsList.length}`;

      track.innerHTML = appState.metricsList.map((current) => {
        const badgeClass = current.status === 'ACTIVE' 
          ? "bg-emerald-500/10 text-emerald-600 border-emerald-500/20" 
          : "bg-amber-500/10 text-amber-600 border-amber-500/20";

        let contextualFields = `
          <div class="flex justify-between items-center border-b border-slate-100 pb-2">
            <span class="text-slate-400 font-medium text-xs">Start Date :</span>
            <span class="text-slate-700 font-bold text-xs">${current.startDate}</span>
          </div>
          <div class="flex justify-between items-center border-b border-slate-100 pb-2">
            <span class="text-slate-400 font-medium text-xs">End Date :</span>
            <span class="text-slate-700 font-bold text-xs">${current.endDate}</span>
          </div>
        `;

        if (isIntern) {
          contextualFields += `
            <div class="flex justify-between items-center">
              <span class="text-slate-500 font-medium text-xs">No. of Tasks :</span>
              <span class="text-indigo-600 font-black text-sm">${current.noOfTask}</span>
            </div>
            <div class="flex justify-between items-center">
              <span class="text-slate-500 font-medium text-xs">Completed Tasks :</span>
              <span class="text-emerald-600 font-black text-sm">${current.noOfCompletedTask}</span>
            </div>
            <div class="flex justify-between items-center">
              <span class="text-slate-500 font-medium text-xs">Pending Tasks :</span>
              <span class="text-amber-500 font-black text-sm">${current.noOfPendingTask}</span>
            </div>
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
              <span class="text-slate-400 font-medium text-xs">Deadline Date :</span>
              <span class="text-slate-700 font-bold text-xs">${current.deadlineDate || 'N/A'}</span>
            </div>
            <div class="flex justify-between items-center pt-2">
              <span class="text-slate-400 font-medium text-xs">Assigned Mentor :</span>
              <span class="text-slate-800 font-extrabold tracking-wide text-xs underline decoration-[#228B22] underline-offset-4">${current.nameOfMentor}</span>
            </div>
          `;
        } else {
          contextualFields += `
            <div class="flex justify-between items-center text-indigo-600">
              <span class="font-medium text-xs">Total Students :</span>
              <span class="font-black text-sm">${current.noOfStudents || 0}</span>
            </div>
            <div class="flex justify-between items-center">
              <span class="text-slate-500 font-medium text-xs">Total Track Tasks :</span>
              <span class="text-slate-700 font-bold text-sm">${current.noOfTask || 0}</span>
            </div>
            <div class="flex justify-between items-center">
              <span class="text-slate-500 font-medium text-xs">Tasks Assigned :</span>
              <span class="text-indigo-600 font-bold text-sm">${current.noOfTaskAssigned || 0}</span>
            </div>
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
              <span class="text-slate-500 font-medium text-xs">Tasks Pending :</span>
              <span class="text-amber-600 font-bold text-sm">${current.noOfTaskPending || 0}</span>
            </div>
          `;
        }

        return `
          <div class="w-full shrink-0 px-1">
            <div class="bg-white border border-slate-100 rounded-3xl p-5 shadow-lg flex flex-col gap-4">
              <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <h3 class="text-base font-black text-slate-800 tracking-wide">${current.companyName}</h3>
                <span class="text-[9px] font-black tracking-widest px-2.5 py-0.5 rounded-full border ${badgeClass}">
                  ${current.status}
                </span>
              </div>
              <div class="space-y-2.5">
                ${contextualFields}
              </div>
              <div class="pt-2">
                <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                  <div class="bg-gradient-to-r from-emerald-500 to-[#228B22] h-full rounded-full" style="width: ${current.progress || 0}%"></div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      updateCarouselPosition();
      setupCarouselIndicators();
    }

    function updateCarouselPosition() {
      const track = document.getElementById('carouselTrack');
      if (track) {
        track.style.transform = `translateX(-${appState.activeIndex * 100}%)`;
        document.getElementById('parallelTrackCount').innerText = `Active Tracks: ${appState.activeIndex + 1} of ${appState.metricsList.length}`;
      }
    }

    function setupCarouselIndicators() {
      const controls = document.getElementById('carouselControls');
      const dotsContainer = document.getElementById('dotIndicators');
      
      if (appState.metricsList.length <= 1) {
        controls.classList.add('hidden');
        return;
      }

      controls.classList.remove('hidden');
      dotsContainer.innerHTML = appState.metricsList.map((_, idx) => `
        <span class="h-1.5 rounded-full transition-all duration-300 ${idx === appState.activeIndex ? 'w-4 bg-[#228B22]' : 'w-1.5 bg-slate-300'}"></span>
      `).join('');
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (appState.activeIndex < appState.metricsList.length - 1) {
        appState.activeIndex++;
        updateCarouselPosition();
        setupCarouselIndicators();
      }
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (appState.activeIndex > 0) {
        appState.activeIndex--;
        updateCarouselPosition();
        setupCarouselIndicators();
      }
    });

let touchStartX = 0;
    let touchEndX = 0;
    const swipeArena = document.getElementById('swipeArena');

    swipeArena.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    swipeArena.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      if (diff > 50 && appState.activeIndex < appState.metricsList.length - 1) {
        appState.activeIndex++;
      } else if (diff < -50 && appState.activeIndex > 0) {
        appState.activeIndex--;
      }
      updateCarouselPosition();
      setupCarouselIndicators();
    }, { passive: true });

    const modal = document.getElementById('addInternModal');
    
    document.getElementById('mentorActionBtn').addEventListener('click', () => {
      modal.classList.remove('hidden');
    });

    document.getElementById('closeModalBtn').addEventListener('click', () => {
      modal.classList.add('hidden');
    });

    document.getElementById('addInternForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        email: document.getElementById('internEmail').value,
        companyName: document.getElementById('compName').value,
        startDate: document.getElementById('sDate').value,
        endDate: document.getElementById('eDate').value,
        noOfTask: parseInt(document.getElementById('totTask').value),
        noOfTaskAssigned: parseInt(document.getElementById('asgnTask').value),
        noOfTaskPending: parseInt(document.getElementById('pendTask').value),
        nameOfMentor: document.getElementById('mentName').value
      };

      try {
        const response = await fetch('/api/admin/certificate/assign-track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          alert('Internship track configured and allocated successfully!');
          modal.classList.add('hidden');
          document.getElementById('addInternForm').reset();
          fetchDashboardData(); 
        } else {
          const errData = await response.json();
          alert(`Allocation Error: ${errData.error || 'Failed allocation structure.'}`);
        }
      } catch (err) {
        alert('Server communications fault. Allocation trace dropped.');
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      updateIcons();
      fetchDashboardData();
    });
  </script>
</body>
</html>
