<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CollegenZ - Internship Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Smooth transition for sliding/switching parallel cards */
    .fade-transition {
      transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
    }
    /* Dynamic blur background fixes */
    .glass-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0.03) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-tr from-slate-900 via-indigo-950 to-slate-900 text-white flex flex-col items-center justify-center p-4 font-sans antialiased">

  <div class="w-full max-w-sm bg-slate-950/40 border border-white/10 rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col h-[780px] relative backdrop-blur-2xl">
    
    <div id="loadingScreen" class="absolute inset-0 bg-slate-950/95 z-50 flex flex-col items-center justify-center gap-3 rounded-[2.5rem]">
      <i data-lucide="loader-2" class="animate-spin text-indigo-500 w-10 h-10"></i>
      <p class="text-sm text-slate-400 font-medium">Fetching Internship Portals...</p>
    </div>

    <div id="errorScreen" class="absolute inset-0 bg-slate-950/95 z-50 hidden flex flex-col items-center justify-center px-6 text-center gap-4 rounded-[2.5rem]">
      <i data-lucide="alert-circle" class="text-rose-500 w-12 h-12"></i>
      <p id="errorMessage" class="text-sm text-slate-300 font-medium">Failed to load dashboards.</p>
    </div>

    <header class="px-6 pt-6 pb-3 flex justify-between items-center border-b border-white/5">
      <div class="flex flex-col">
        <h1 id="appLogoTitle" class="text-xl font-bold tracking-tight text-indigo-400">ZIntern</h1>
        <span id="userEmailBadge" class="text-[9px] text-slate-400 max-w-[180px] truncate mt-0.5">Loading account session...</span>
      </div>
      <div class="flex items-center gap-4 text-slate-300">
        <button class="hover:text-white transition cursor-pointer p-1">
          <i data-lucide="bell" class="w-5 h-5"></i>
        </button>
        <img 
          id="userAvatar"
          src="https://collegenz.in/uploads/profilepic.jpg" 
          alt="Profile" 
          class="w-8 h-8 rounded-full object-cover border border-white/20 shadow-md"
        />
      </div>
    </header>

    <div class="px-6 py-3 flex justify-between items-center bg-white/[0.01]">
      <div>
        <h2 id="dashboardRoleTitle" class="text-base font-semibold text-slate-200">Intern Dashboard</h2>
        <p id="parallelTrackCount" class="text-[11px] text-indigo-300 font-medium mt-0.5">Active Tracks: 1 of 1</p>
      </div>
      <button class="text-slate-400 hover:text-white cursor-pointer p-1">
        <i data-lucide="more-vertical" class="w-5 h-5"></i>
      </button>
    </div>

    <main class="flex-1 px-5 py-4 overflow-y-auto flex flex-col justify-start">
      
      <div class="w-full relative mt-2">
        
        <div id="metricDisplayCard" class="w-full glass-card border border-white/15 rounded-2xl p-5 shadow-2xl fade-transition">
          
          <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-3">
            <h3 id="companyNameText" class="text-base font-bold tracking-wide text-white">CodeAlpha</h3>
            <span id="statusBadge" class="text-[9px] font-bold tracking-widest px-2.5 py-0.5 rounded-full border bg-emerald-500/20 text-emerald-400 border-emerald-500/30">
              STATUS : ACTIVE
            </span>
          </div>

          <div id="cardFieldsContainer" class="space-y-3 text-sm font-medium text-slate-300">
            </div>

        </div>

        <div id="carouselControls" class="flex justify-center gap-6 mt-5 items-center hidden">
          <button id="prevBtn" class="p-2 rounded-full bg-white/5 border border-white/10 text-slate-300 hover:text-white hover:bg-white/10 transition cursor-pointer shadow-md">
            <i data-lucide="chevron-left" class="w-4.5 h-4.5"></i>
          </button>
          
          <div id="dotIndicators" class="flex gap-1.5 items-center"></div>

          <button id="nextBtn" class="p-2 rounded-full bg-white/5 border border-white/10 text-slate-300 hover:text-white hover:bg-white/10 transition cursor-pointer shadow-md">
            <i data-lucide="chevron-right" class="w-4.5 h-4.5"></i>
          </button>
        </div>

      </div>

    </main>

    <div class="text-center py-2.5 text-[11px] tracking-wide text-slate-400 bg-slate-950/20 border-t border-white/5">
      Socialize with our <span class="font-extrabold text-white tracking-normal">CollegenZ</span>
    </div>

    <nav class="bg-slate-950/80 border-t border-white/10 grid grid-cols-4 pb-5 pt-2.5 text-center relative z-10 backdrop-blur-lg">
      <button class="flex flex-col items-center justify-center gap-1 text-indigo-400 font-bold transition cursor-pointer">
        <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
        <span class="text-[10px]">Dashboard</span>
      </button>
      
      <button class="flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-white transition cursor-pointer">
        <i data-lucide="message-circle" class="w-5 h-5"></i>
        <span class="text-[10px]">Chat</span>
      </button>
      
      <button class="flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-white transition cursor-pointer">
        <i data-lucide="file-text" class="w-5 h-5"></i>
        <span class="text-[10px]">Task</span>
      </button>
      
      <button class="flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-white transition cursor-pointer">
        <i data-lucide="video" class="w-5 h-5"></i>
        <span class="text-[10px] leading-tight">Meeting/<br/>Webinar</span>
      </button>
    </nav>

  </div>

  <script>
    // Extract ID directly from target URL parameter string (?id=...)
    const urlParams = new URLSearchParams(window.location.search);
    let targetUserId = urlParams.get('id');

    // Fallback Mock Token ID for localized staging environment test checking
    if (!targetUserId) {
      targetUserId = "65f123456789abcdef012345";
    }


    function updateIcons() {
      lucide.createIcons();
    }

    async function fetchDashboardData() {
      try {
        const response = await fetch(BACKEND_API_URL);
        if (!response.ok) throw new Error("Could not fetch profile properties from DB server.");
        
        const data = await response.json();
        
        // Handle fallback parsing adjustments if profile data array payload object metrics mismatch
        if (!data.metricsList || data.metricsList.length === 0 || data.zrole === 'user') {
          showError("Access Blocked. No active parallel internship metrics configured on this account identity.");
          return;
        }

        appState.zrole = data.zrole;
        appState.metricsList = data.metricsList;
        appState.activeIndex = 0;

        // Apply metadata updates safely
        document.getElementById('userAvatar').src = data.picture || "https://collegenz.in/uploads/profilepic.jpg";
        document.getElementById('appLogoTitle').innerText = data.zrole === 'intern' ? 'ZIntern' : 'ZMentor';
        document.getElementById('dashboardRoleTitle').innerText = data.zrole === 'intern' ? 'Intern Dashboard' : 'Mentor Dashboard';
        
        // Render current logged in verification email context matching view requirements
        document.getElementById('userEmailBadge').innerText = data.email || "session: active_user";

        // Hide overlay loader layer
        document.getElementById('loadingScreen').classList.add('hidden');
        renderActiveCard();
        
      } catch (err) {
        console.error(err);
        showError("Backend connection error. Verify that your Express API route mounts on /api/dashboard/:id");
      }
    }

    function showError(msg) {
      document.getElementById('loadingScreen').classList.add('hidden');
      const errScreen = document.getElementById('errorScreen');
      document.getElementById('errorMessage').innerText = msg;
      errScreen.classList.remove('hidden');
      updateIcons();
    }

    function renderActiveCard() {
      const current = appState.metricsList[appState.activeIndex];
      const isIntern = appState.zrole === 'intern';
      
      document.getElementById('companyNameText').innerText = current.companyName || "CodeAlpha";
      document.getElementById('parallelTrackCount').innerText = `Active Tracks: ${appState.activeIndex + 1} of ${appState.metricsList.length}`;
      
      const badge = document.getElementById('statusBadge');
      badge.innerText = `STATUS : ${current.status || 'ACTIVE'}`;
      if (current.status === 'ACTIVE') {
        badge.className = "text-[9px] font-bold tracking-widest px-2.5 py-0.5 rounded-full border bg-emerald-500/15 text-emerald-400 border-emerald-500/30";
      } else {
        badge.className = "text-[9px] font-bold tracking-widest px-2.5 py-0.5 rounded-full border bg-rose-500/15 text-rose-400 border-rose-500/30";
      }

      let fieldsHTML = `
        <div class="flex justify-between items-center border-b border-white/[0.02] pb-1.5">
          <span class="text-slate-400 font-normal">Start Date :</span>
          <span class="text-slate-100">${current.startDate} 🕒</span>
        </div>
        <div class="flex justify-between items-center border-b border-white/[0.02] pb-1.5">
          <span class="text-slate-400 font-normal">End Date :</span>
          <span class="text-slate-100">${current.endDate} 🕒</span>
        </div>
      `;

      if (isIntern) {
        fieldsHTML += `
          <div class="flex justify-between items-center">
            <span class="text-slate-400 font-normal">No. of Task :</span>
            <span class="text-indigo-400 font-semibold text-base">${current.noOfTask}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-400 font-normal">No. of Completed task :</span>
            <span class="text-emerald-400 font-semibold text-base">${current.noOfCompletedTask}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-400 font-normal">No. of Pending task :</span>
            <span class="text-amber-400 font-semibold text-base">${current.noOfPendingTask}</span>
          </div>
          <div class="flex justify-between items-center border-b border-white/[0.02] pb-1.5">
            <span class="text-slate-400 font-normal">Deadline Date :</span>
            <span class="text-slate-100">${current.deadlineDate}</span>
          </div>
          <div class="flex justify-between items-center border-t border-white/10 pt-2.5 mt-2">
            <span class="text-slate-400 font-normal">Name of Mentor :</span>
            <span class="text-indigo-300 underline underline-offset-4 font-bold tracking-wide">${current.nameOfMentor}</span>
          </div>
        `;
      } else {
        fieldsHTML += `
          <div class="flex justify-between items-center text-indigo-300">
            <span class="font-normal">No. of Students :</span>
            <span class="font-bold text-lg">${current.noOfStudents}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-400 font-normal">No. of Task :</span>
            <span class="text-slate-100 font-medium">${current.noOfTask}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-400 font-normal">No. of Task Assigned :</span>
            <span class="text-indigo-400 font-semibold text-base">${current.noOfTaskAssigned}</span>
          </div>
          <div class="flex justify-between items-center border-b border-white/[0.02] pb-1.5">
            <span class="text-slate-400 font-normal">No. of Task Pending :</span>
            <span class="text-amber-400 font-semibold text-base">${current.noOfTaskPending}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-400 font-normal">Deadline Date :</span>
            <span class="text-slate-100">${current.deadlineDate}</span>
          </div>
        `;
      }

      // Add dynamic layout track filler
      fieldsHTML += `
        <div class="pt-3">
          <div class="w-full bg-slate-950/60 rounded-full h-2 overflow-hidden border border-white/5">
            <div 
              class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full rounded-full transition-all duration-500"
              style="width: ${current.progress || 0}%"
            ></div>
          </div>
        </div>
      `;

      document.getElementById('cardFieldsContainer').innerHTML = fieldsHTML;

      setupCarouselControls();
      updateIcons();
    }

    function setupCarouselControls() {
      const controls = document.getElementById('carouselControls');
      const dotsContainer = document.getElementById('dotIndicators');
      
      if (appState.metricsList.length <= 1) {
        controls.classList.add('hidden');
        return;
      }

      controls.classList.remove('hidden');
      dotsContainer.innerHTML = appState.metricsList.map((_, idx) => `
        <span class="h-1.5 rounded-full transition-all duration-300 ${idx === appState.activeIndex ? 'w-4 bg-indigo-500' : 'w-1.5 bg-slate-600'}"></span>
      `).join('');
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      animateCardChange(() => {
        appState.activeIndex = (appState.activeIndex + 1) % appState.metricsList.length;
      });
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      animateCardChange(() => {
        appState.activeIndex = (appState.activeIndex - 1 + appState.metricsList.length) % appState.metricsList.length;
      });
    });

    function animateCardChange(indexUpdateCallback) {
      const card = document.getElementById('metricDisplayCard');
      card.style.opacity = '0';
      card.style.transform = 'scale(0.98)';
      
      setTimeout(() => {
        indexUpdateCallback();
        renderActiveCard();
        card.style.opacity = '1';
        card.style.transform = 'scale(1)';
      }, 150);
    }

    window.addEventListener('DOMContentLoaded', () => {
      updateIcons();
      fetchDashboardData();
    });
  </script>
</body>
</html>
