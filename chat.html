<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat | CollegenZ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>
:root {
  --collegenz-green: #228B22;
  --bg-page: #f0f2f5;
  --bg-chat: #efeae2; 
  --msg-me: #dcf8c6; 
  --msg-other: #ffffff;
  --text-dark: #111b21;
  --text-muted: #667781;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: var(--bg-page); height: 100vh; display: flex; justify-content: center; align-items: center; }

.chat-wrapper { width: 100%; max-width: 480px; height: 100dvh; background: var(--bg-chat); display: flex; flex-direction: column; position: relative; }
@media (min-width: 768px) { .chat-wrapper { height: 90vh; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; } }

.chat-header { background: var(--collegenz-green); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; z-index: 10; }
.back-btn { color: white; font-size: 24px; text-decoration: none; }
.chat-header img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.8); }
.header-info h4 { margin: 0; font-size: 16px; }
.header-info span { font-size: 12px; opacity: 0.9; }

.messages { flex: 1; padding: 20px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.date-separator { align-self: center; background: rgba(255,255,255,0.9); color: var(--text-muted); font-size: 12px; padding: 6px 12px; border-radius: 12px; margin: 12px 0; }

.msg-row { display: flex; width: 100%; }
.msg-row.me { justify-content: flex-end; }
.msg-row.other { justify-content: flex-start; }
.msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
.msg-row.me .msg { background: var(--msg-me); border-top-right-radius: 4px; }
.msg-row.other .msg { background: var(--msg-other); border-top-left-radius: 4px; }

.status-row { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 4px; font-size: 11px; color: var(--text-muted); }

.typing { font-size: 13px; color: var(--collegenz-green); font-style: italic; padding: 0 16px 8px; min-height: 20px; }

.chat-input-wrapper { background: #f0f2f5; padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
.chat-input-wrapper input { flex: 1; padding: 12px 18px; border-radius: 24px; border: none; outline: none; }
.send-btn { background: var(--collegenz-green); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; }
</style>
</head>

<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <a href="/messages" class="back-btn"><i class="bi bi-arrow-left-short"></i></a>
    <img src="/uploads/profilepic.jpg" id="headerAvatar">
    <div class="header-info">
      <h4 id="friendName">Loading...</h4>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>
  <div class="typing" id="typingDisplay" style="visibility: hidden;">typing...</div>

  <form class="chat-input-wrapper" id="chatForm">
    <input type="text" id="messageInput" placeholder="Type a message" autocomplete="off">
    <button class="send-btn" type="submit"><i class="bi bi-send-fill"></i></button>
  </form>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(async () => {
  const socket = io();
  const friendId = location.pathname.split("/").pop();
  const box = document.getElementById("messages");
  const input = document.getElementById("messageInput");
  const typingDisplay = document.getElementById("typingDisplay");
  const statusText = document.getElementById("statusText");

  try {
    // 1. Fetch Auth & Friend Data
    const [meRes, friendRes] = await Promise.all([
      fetch("/api/me"),
      fetch(`/api/user/${friendId}`)
    ]);

    const meData = await meRes.json();
    const friend = await friendRes.json();

    if (!meData.isLoggedIn) { window.location.href = "/login"; return; }
    
    const myId = meData.user._id;
    document.getElementById("friendName").textContent = friend.username || "User";
    document.getElementById("headerAvatar").src = friend.picture || "/uploads/profilepic.jpg";

    // 2. Room Setup (ID sorting ensures both users join the same room)
    const room = [myId, friendId].sort().join("_");
    socket.emit("joinRoom", room);

    // 3. Load Chat History
    const historyRes = await fetch(`/api/messages/${friendId}`);
    if (historyRes.ok) {
      const history = await historyRes.json();
      history.forEach(m => addMessage(m.text, m.sender === myId, m.createdAt));
    }

    // 4. Socket Listeners
    socket.on("newMessage", msg => {
      if (msg.sender !== myId) addMessage(msg.text, false, msg.createdAt);
    });

    let typingTimeout;
    socket.on("typing", () => {
      typingDisplay.style.visibility = "visible";
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => typingDisplay.style.visibility = "hidden", 1500);
    });

    socket.on("userStatus", status => {
      statusText.textContent = status; // "Online" or "Offline"
    });

    // 5. Send Message Logic
    document.getElementById("chatForm").onsubmit = e => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      // Optimistic UI (Render locally immediately)
      addMessage(text, true);

      socket.emit("sendMessage", {
        room,
        sender: myId,
        receiver: friendId,
        text
      });

      input.value = "";
    };

    input.onkeypress = () => socket.emit("typing", room);

  } catch (err) {
    console.error("Chat setup error:", err);
    statusText.textContent = "Offline";
  }

  function addMessage(text, isMe, timeStamp = null) {
    const time = timeStamp 
      ? new Date(timeStamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const row = document.createElement("div");
    row.className = `msg-row ${isMe ? "me" : "other"}`;
    row.innerHTML = `
      <div class="msg">
        ${text}
        <div class="status-row">
          <span>${time}</span>
          ${isMe ? '<i class="bi bi-check2"></i>' : ''}
        </div>
      </div>
    `;
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
  }
})();

if ('serviceWorker' in navigator && 'PushManager' in window) {
    navigator.serviceWorker.register('/sw.js')
    .then(registration => {
        return registration.pushManager.getSubscription()
        .then(async subscription => {
            if (subscription) return subscription;
            
            // Subscribe user if not already subscribed
            return registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: 'YOUR_VAPID_PUBLIC_KEY_FROM_ENV'
            });
        });
    })
    .then(subscription => {
        // Send this subscription object to your server to save it in User model
        fetch('/api/save-subscription', {
            method: 'POST',
            body: JSON.stringify(subscription),
            headers: { 'Content-Type': 'application/json' }
        });
    });
}

</script>
</body>
</html>
