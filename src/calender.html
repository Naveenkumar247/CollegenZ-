<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8168910937798143" crossorigin="anonymous"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Events Calendar | CollegenZ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  
  <style>
    /* ==========================================================================
       GLOBAL DESIGN SYSTEM & VARIABLES
       ========================================================================== */
    :root {
      --primary-color: #228B22;
      --primary-hover: #1c6f1c;
      --bg-color: #f4f6f9;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', 'Open Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
    }

    /* ==========================================================================
       HEADER STRUCTURAL HUB (Sticky Premium Green Theme)
       ========================================================================== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 64px;
      z-index: 1000;
      background: var(--primary-color);
      box-shadow: 0 4px 12px rgba(34, 139, 34, 0.15);
    }

    .bottom-header {
      height: 64px;
      display: flex;
      align-items: center;
      width: 100%;
      padding: 0 15px;
    }

    .sketch-header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .header-logo-text {
      font-size: 22px;
      font-weight: bold;
      margin: 0;
      color: #ffffff;
      text-align: center;
      flex: 1;
    }

    .header-logo-text a {
      text-decoration: none;
      color: inherit;
    }

    .header-actions {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .header-actions i {
      color: #ffffff;
      font-size: 24px;
      cursor: pointer;
    }

    /* ==========================================================================
       NAVIGATION SYSTEMS (Mobile Native View Bottom bar)
       ========================================================================== */
    .sidebar {
      width: 100%;
      height: 60px;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #ffffff;
      border-top: 1px solid var(--border-color);
      z-index: 999;
      display: flex;
    }

    .sidebar .icon {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-evenly;
      width: 100%;
      height: 100%;
    }

    .sidebar a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-decoration: none;
    }

    /* ==========================================================================
       WORKSPACE VIEW CONTAINERS
       ========================================================================== */
    .desktop-main-wrapper {
      margin-top: 64px;
      padding: 20px 15px 80px;
      width: 100%;
      display: block;
    }

    h1 {
      text-align: center;
      font-size: 1.8em;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .back-link-container {
      text-align: center;
      margin-bottom: 20px;
    }

    .back-link-container a {
      color: #0073e6;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95em;
    }

    .back-link-container a:hover {
      text-decoration: underline;
    }

    #calendar {
      max-width: 100%;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: var(--radius-md);
      padding: 15px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
    }

    /* Notification Badges */
    .notification-badge {
      display: flex;
    }

    /* ==========================================================================
       HIGH-END RESPONSIVE DESKTOP BREAKPOINTS (Clean Workspace Layout Sync)
       ========================================================================== */
    @media (min-width: 992px) {
      .bottom-header { 
        max-width: 100%; 
        padding: 0 40px;
        margin: 0; 
      }

      /* Transforms native bar into structured workspace side-panel */
      .sidebar {
        width: 260px;
        height: calc(100vh - 64px);
        position: fixed;
        top: 64px;
        bottom: auto;
        left: 0; 
        background: var(--card-bg);
        border-top: none;
        border-right: 1px solid var(--border-color);
        box-shadow: none;
        flex-direction: column;
        padding: 24px 16px;
        justify-content: flex-start;
        z-index: 900;
        display: flex;
      }

      .sidebar::before {
        content: "NAVIGATION";
        font-size: 11px;
        font-weight: 800;
        color: var(--text-muted);
        letter-spacing: 1px;
        padding-left: 12px;
        margin-bottom: 16px;
        display: block;
        width: 100%;
        text-align: left;
      }

      .sidebar .icon {
        flex-direction: column;
        justify-content: flex-start;
        gap: 8px;
        height: auto;
        width: 100%;
      }

      .sidebar a {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-muted);
        transition: var(--transition-smooth);
        gap: 14px;
      }

      /* Calendar active tracking block selection states */
      .sidebar a[aria-label="Calendar"], .sidebar a.active-link-indicator {
        background: #f0fdf4;
        color: var(--primary-color);
        font-weight: 600;
        border-left: 3px solid var(--primary-color);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        padding-left: 13px; 
      }

      .sidebar a:hover:not([aria-label="Calendar"]) {
        background: #f8fafc;
        color: var(--text-main);
      }

      /* Dynamic text naming label assignments */
      .sidebar a::after {
        font-size: 14px;
        font-weight: 500;
        font-family: 'Poppins', sans-serif;
        color: inherit;
      }
      .sidebar a[aria-label="Home"]::after { content: "Home"; }
      .sidebar a[aria-label="Shorts"]::after { content: "Infobyts"; }
      .sidebar a[aria-label="Chat"]::after { content: "Chat"; }
      .sidebar a[aria-label="Calendar"]::after { content: "Calendar"; }

      /* Clear main layout components past 260px fixed tracker panels */
      .desktop-main-wrapper {
        margin-left: 260px;
        width: calc(100% - 260px);
        max-width: 1000px; 
        padding: 40px;
      }

      #calendar {
        box-shadow: var(--shadow-md);
        padding: 25px;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="bottom-header">
      <div class="sketch-header-content">
        <div class="header-actions"><i class="bi bi-list"></i></div>
        <h1 class="header-logo-text"><a href="/">CollegenZ</a></h1>
        <div class="header-actions">
          <i class="bi bi-bell"></i>
        </div>
      </div>
    </div>
  </header>

  <nav class="sidebar">
    <div class="icon">
      <a href="/" aria-label="Home">
        <div class="nav-icon-container">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z" fill="currentColor"/>
          </svg>
        </div>
      </a>

      <a href="/shorts" aria-label="Shorts">
        <div class="nav-icon-container">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <defs>
              <mask id="reels-cutout">
                <rect width="24" height="24" fill="white" />
                <path d="M10 10.5v5l4.5-2.5z" fill="black" />
                <rect x="0" y="7" width="24" height="1.5" fill="black" />
                <path d="M7.5 2l-2.5 5h2l2.5-5z" fill="black" />
                <path d="M14.5 2l-2.5 5h2l2.5-5z" fill="black" />
                <path d="M21.5 2l-2.5 5h2l2.5-5z" fill="black" />
              </mask>
            </defs>
            <rect x="2" y="2" width="20" height="20" rx="4" fill="currentColor" mask="url(#reels-cutout)" />
          </svg>
        </div>
      </a>
      
      <a href="/friends" aria-label="Chat">
        <div class="nav-icon-container" style="position: relative; display: inline-flex; width: 24px; height: 24px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path d="M12 3c5.5 0 10 3.58 10 8 0 2.5-1.4 4.74-3.55 6.15.3.92 1.05 2.22 1.05 2.22s-1.7.13-3.65-.9c-1.2.35-2.5.53-3.85.53-5.5 0-10-3.58-10-8s4.5-8 10-8z" fill="currentColor"/>
            <circle cx="7.5" cy="11" r="1.5" fill="#ffffff"/>
            <circle cx="12" cy="11" r="1.5" fill="#ffffff"/>
            <circle cx="16.5" cy="11" r="1.5" fill="#ffffff"/>
          </svg>
          <span id="global-chat-badge" class="notification-badge" style="display: none; position: absolute; top: -6px; right: -8px; background-color: #ff3b30; color: white; font-size: 10px; font-weight: bold; font-family: sans-serif; border-radius: 50%; min-width: 16px; height: 16px; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid #ffffff;">0</span>
        </div>
      </a>

      <a href="/calender" aria-label="Calendar">
        <div class="nav-icon-container" style="position: relative; display: inline-flex; width: 24px; height: 24px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <rect x="3" y="5" width="18" height="17" rx="2" ry="2" fill="currentColor" />
            <rect x="6.5" y="3" width="2.5" height="4" rx="1" fill="currentColor" />
            <rect x="15" y="3" width="2.5" height="4" rx="1" fill="currentColor" />
            <rect x="5" y="9.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="8.5" y="9.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="12" y="9.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="15.5" y="9.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="5" y="13" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="8.5" y="13" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="12" y="13" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="15.5" y="13" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="5" y="16.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="8.5" y="16.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="12" y="16.5" width="6" height="2.5" fill="#ffffff" />
          </svg>
          <span class="notification-badge" style="position: absolute; top: -6px; right: -8px; background-color: #ff3b30; color: white; font-size: 10px; font-weight: bold; font-family: sans-serif; border-radius: 50%; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid #ffffff;">5</span>
        </div>
      </a>
    </div>
  </nav>

  <main class="desktop-main-wrapper">
    <h1>All Saved Events</h1>
    <div class="back-link-container">
      <a href="/">← Back to Home</a>
    </div>
    <div id="calendar"></div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetch("/api/events");
        const events = await res.json();

        const calendarEl = document.getElementById("calendar");
        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: window.innerWidth < 768 ? "listMonth" : "dayGridMonth",
          events: events,
          height: "auto"
        });
        calendar.render();
      } catch (error) {
        console.error("Failed to load events:", error);
      }
    });
  </script>
</body>
</html>
