<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8168910937798143" crossorigin="anonymous"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chats | CollegenZ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>
    /* ==========================================================================
       GLOBAL DESIGN SYSTEM & VARIABLES
       ========================================================================== */
    :root {
      --primary-color: #228B22;
      --primary-hover: #1c6f1c;
      --bg-color: #f4f6f9;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', 'Open Sans', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ==========================================================================
       HEADER APPLICATION HUB BAR
       ========================================================================== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 64px;
      z-index: 1000;
      background: var(--primary-color);
      box-shadow: 0 4px 12px rgba(34, 139, 34, 0.15);
    }

    .bottom-header {
      height: 64px;
      display: flex;
      align-items: center;
      width: 100%;
      padding: 0 15px;
    }

    .sketch-header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .header-logo-text {
      font-size: 22px;
      font-weight: bold;
      margin: 0;
      color: #ffffff;
      text-align: center;
      flex: 1;
    }
    .header-logo-text a { text-decoration: none; color: inherit; }

    .header-actions { display: flex; gap: 15px; align-items: center; }
    .header-actions i { color: #ffffff; font-size: 24px; cursor: pointer; }

    /* ==========================================================================
       NAVIGATION INFRASTRUCTURE (Universal Responsive Trackers)
       ========================================================================== */
    .sidebar {
      width: 100%;
      height: 60px;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #ffffff;
      border-top: 1px solid var(--border-color);
      z-index: 999;
      display: flex;
    }

    .sidebar .icon {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-evenly;
      width: 100%;
      height: 100%;
    }

    .sidebar a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-decoration: none;
    }

    /* ==========================================================================
       WORKSPACE CONTENT MATRIX CONTAINERS (Mobile Feed Layout)
       ========================================================================== */
    .main-feed-container {
      margin-top: 64px;
      padding: 16px 16px 80px 16px; /* Space clear of mobile bottom navigation */
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chat-list-wrapper {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    .chat-row {
      display: flex;
      gap: 12px;
      padding: 14px;
      text-decoration: none;
      color: var(--text-main);
      border-bottom: 1px solid var(--border-color);
      align-items: center;
      transition: background 0.2s ease;
    }
    .chat-row:last-child { border-bottom: none; }
    .chat-row:hover { background: #f8fafc; }

    .avatar { position: relative; display: inline-flex; }
    .avatar img { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; background: #e2e8f0; }
    .online-dot { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; background: var(--primary-color); border-radius: 50%; border: 2px solid #fff; }

    .chat-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .chat-top { display: flex; justify-content: space-between; align-items: center; }
    .chat-name { font-weight: 600; font-size: 15px; }
    .chat-time { font-size: 12px; color: var(--text-muted); }
    .chat-bottom { display: flex; justify-content: space-between; align-items: center; }
    .chat-preview { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

    .unread-badge { background: var(--primary-color); color: white; font-size: 11px; font-weight: 600; min-width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; }
    .empty { padding: 30px; text-align: center; color: var(--text-muted); font-size: 14px; }

    /* Notification Badges for Navigation */
    .notification-badge {
      position: absolute;
      top: -6px;
      right: -8px;
      background-color: #ff3b30;
      color: white;
      font-size: 10px;
      font-weight: bold;
      font-family: sans-serif;
      border-radius: 50%;
      min-width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid #ffffff;
    }

    /* ==========================================================================
       HIGH-END RESPONSIVE DESKTOP BREAKPOINTS
       ========================================================================== */
    @media (min-width: 768px) {
      .bottom-header { 
        max-width: 100%; 
        padding: 0 40px;
        margin: 0; 
      }

      /* Transforms bottom layout tabs natively into a left structural side panel */
      .sidebar {
        width: 260px;
        height: calc(100vh - 64px);
        position: fixed;
        top: 64px;
        bottom: auto;
        left: 0; 
        right: auto;
        background: var(--card-bg);
        border-top: none;
        border-right: 1px solid var(--border-color);
        box-shadow: none;
        flex-direction: column;
        padding: 24px 16px;
        justify-content: flex-start;
        z-index: 900;
        display: flex;
      }

      .sidebar::before {
        content: "NAVIGATION";
        font-size: 11px;
        font-weight: 800;
        color: var(--text-muted);
        letter-spacing: 1px;
        padding-left: 12px;
        margin-bottom: 16px;
        display: block;
        width: 100%;
        text-align: left;
      }

      .sidebar .icon {
        flex-direction: column;
        justify-content: flex-start;
        gap: 8px;
        height: auto;
        width: 100%;
      }

      .sidebar a {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-muted);
        transition: var(--transition-smooth);
        gap: 14px;
      }

      /* Chat link active panel layout states */
      .sidebar a[aria-label="Chat"], .sidebar a.active-link-indicator {
        background: #f0fdf4;
        color: var(--primary-color);
        font-weight: 600;
        border-left: 3px solid var(--primary-color);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        padding-left: 13px; 
      }

      .sidebar a:hover:not([aria-label="Chat"]) {
        background: #f8fafc;
        color: var(--text-main);
      }

      /* Injects descriptive typography adjacent to scalable icons */
      .sidebar a::after {
        font-size: 14px;
        font-weight: 500;
        font-family: 'Poppins', sans-serif;
        color: inherit;
      }
      .sidebar a[aria-label="Home"]::after { content: "Home"; }
      .sidebar a[aria-label="Shorts"]::after { content: "Infobyts"; }
      .sidebar a[aria-label="Chat"]::after { content: "Chat"; }
      .sidebar a[aria-label="Calendar"]::after { content: "Calendar"; }

      /* Centers the master content stream matrix crisp of layout panel bars */
      .main-feed-container {
        margin-left: 260px;
        width: calc(100% - 260px);
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .chat-list-wrapper {
        max-width: 700px;
        box-shadow: var(--shadow-md);
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="bottom-header">
      <div class="sketch-header-content">
        <div class="header-actions"><i class="bi bi-list"></i></div>
        <h1 class="header-logo-text"><a href="/">CollegenZ</a></h1>
        <div class="header-actions">
          <i class="bi bi-bell"></i>
        </div>
      </div>
    </div>
  </header>

  <nav class="sidebar">
    <div class="icon">
      <a href="/" aria-label="Home">
        <div class="nav-icon-container">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z" fill="currentColor"/>
          </svg>
        </div>
      </a>

      <a href="/shorts" aria-label="Shorts">
        <div class="nav-icon-container">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <defs>
              <mask id="reels-cutout">
                <rect width="24" height="24" fill="white" />
                <path d="M10 10.5v5l4.5-2.5z" fill="black" />
                <rect x="0" y="7" width="24" height="1.5" fill="black" />
                <path d="M7.5 2l-2.5 5h2l2.5-5z" fill="black" />
                <path d="M14.5 2l-2.5 5h2l2.5-5z" fill="black" />
                <path d="M21.5 2l-2.5 5h2l2.5-5z" fill="black" />
              </mask>
            </defs>
            <rect x="2" y="2" width="20" height="20" rx="4" fill="currentColor" mask="url(#reels-cutout)" />
          </svg>
        </div>
      </a>
      
      <a href="/friends" aria-label="Chat">
        <div class="nav-icon-container" style="position: relative; display: inline-flex; width: 24px; height: 24px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path d="M12 3c5.5 0 10 3.58 10 8 0 2.5-1.4 4.74-3.55 6.15.3.92 1.05 2.22 1.05 2.22s-1.7.13-3.65-.9c-1.2.35-2.5.53-3.85.53-5.5 0-10-3.58-10-8s4.5-8 10-8z" fill="currentColor"/>
            <circle cx="7.5" cy="11" r="1.5" fill="#ffffff"/>
            <circle cx="12" cy="11" r="1.5" fill="#ffffff"/>
            <circle cx="16.5" cy="11" r="1.5" fill="#ffffff"/>
          </svg>
          <span id="global-chat-badge" class="notification-badge" style="display: none;">0</span>
        </div>
      </a>

      <a href="/calendar" aria-label="Calendar">
        <div class="nav-icon-container" style="position: relative; display: inline-flex; width: 24px; height: 24px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <rect x="3" y="5" width="18" height="17" rx="2" ry="2" fill="currentColor" />
            <rect x="6.5" y="3" width="2.5" height="4" rx="1" fill="currentColor" />
            <rect x="15" y="3" width="2.5" height="4" rx="1" fill="currentColor" />
            <rect x="5" y="9.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="8.5" y="9.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="12" y="9.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="15.5" y="9.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="5" y="13" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="8.5" y="13" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="12" y="13" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="15.5" y="13" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="5" y="16.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="8.5" y="16.5" width="2.5" height="2.5" fill="#ffffff" />
            <rect x="12" y="16.5" width="6" height="2.5" fill="#ffffff" />
          </svg>
          <span class="notification-badge">5</span>
        </div>
      </a>
    </div>
  </nav>

  <main class="main-feed-container">
    <div class="chat-list-wrapper" id="chat-container">
      <div class="empty">Loading chats...</div>
    </div>
  </main>

  <script>
    async function loadFriends() {
      const container = document.getElementById('chat-container');

      try {
        const response = await fetch('/api/friends');
        
        if (response.status === 401) {
          window.location.href = '/login';
          return;
        }

        if (!response.ok) throw new Error('Failed to fetch data');

        const friends = await response.json();
        container.innerHTML = '';

        if (!Array.isArray(friends) || friends.length === 0) {
          container.innerHTML = '<div class="empty">No friends yet</div>';
          return;
        }

        friends.forEach(f => {
          const timeString = f.lastMessageAt 
            ? new Date(f.lastMessageAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
            : "";
          
          const unreadHTML = f.unreadCount > 0 
            ? `<span class="unread-badge">${f.unreadCount}</span>` 
            : "";
          
          const onlineHTML = f.isOnline 
            ? `<span class="online-dot"></span>` 
            : "";

          const profilePic = f.picture || '/uploads/profilepic.jpg';
          const lastMessageText = f.lastMessage || "Tap to start chatting";
          const userName = f.name || "Unknown User";

          const card = document.createElement('a');
          card.href = `/chat/${f._id}`;
          card.className = "chat-row";
          
          card.innerHTML = `
            <div class="avatar">
              <img src="${profilePic}" alt="${userName}" onerror="this.src='/uploads/profilepic.jpg'">
              ${onlineHTML}
            </div>
            <div class="chat-info">
              <div class="chat-top">
                <span class="chat-name">${userName}</span>
                <span class="chat-time">${timeString}</span>
              </div>
              <div class="chat-bottom">
                <span class="chat-preview">${lastMessageText}</span>
                ${unreadHTML}
              </div>
            </div>
          `;

          container.appendChild(card);
        });

      } catch (error) {
        console.error("Error loading friends list:", error);
        container.innerHTML = '<div class="empty" style="color:#d93025;">Failed to load chats. Please try again later.</div>';
      }
    }

    async function markMessagesAsRead(friendId) {
      try {
        await fetch('/api/messages/mark-read', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ friendId: friendId }) 
        });
      } catch (error) {
        console.error("Failed to mark messages as read:", error);
      }
    }

    const currentFriendId = window.location.pathname.split('/').pop(); 

    document.addEventListener('DOMContentLoaded', () => {
        if (/[a-fA-F0-9]{24}/.test(currentFriendId)) {
          markMessagesAsRead(currentFriendId);
        }
    });

    window.addEventListener('DOMContentLoaded', loadFriends);
  </script>
</body>
</html>
