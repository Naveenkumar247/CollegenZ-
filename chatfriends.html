<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Base Styles & Desktop Sidebar Fixes */
    body { 
      margin: 0; 
      font-family: system-ui, sans-serif; 
      background: #f8f9fa; 
      color: #222; 
      padding-right: 60px; /* Prevents desktop sidebar from covering content */
    }
    
    .top { 
      background: #228B22; 
      color: white; 
      padding: 14px; 
      font-size: 18px; 
      font-weight: 600; 
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .chat-list { background: #fff; min-height: 100px; }
    .chat-row { display: flex; gap: 12px; padding: 14px; text-decoration: none; color: #222; border-bottom: 1px solid #eee; align-items: center; }
    .chat-row:hover { background: #f4fdf4; }
    
    .avatar { position: relative; }
    .avatar img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #ddd; }
    .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #228B22; border-radius: 50%; border: 2px solid #fff; }
    
    .chat-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .chat-top { display: flex; justify-content: space-between; align-items: center; }
    .chat-name { font-weight: 600; font-size: 15px; }
    .chat-time { font-size: 12px; color: #777; }
    .chat-bottom { display: flex; justify-content: space-between; align-items: center; }
    .chat-preview { font-size: 13px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    
    .unread-badge { background: #228B22; color: white; font-size: 11px; font-weight: 600; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .empty { padding: 20px; text-align: center; color: #777; }
    
    /* Sidebar CSS */
    .sidebar { width: 60px; background: #f1f1f1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 1rem 0; position: fixed; top: 0; right: 0; height: 100vh; z-index: 2000; transition: all 0.3s ease-in-out; box-shadow: -2px 0 8px rgba(0,0,0,0.1); }
    .sidebar .icon { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; margin-top: 2rem; width: 100%; }
    .sidebar img { width: 45px; height: 45px; transition: transform 0.2s ease; }
    .sidebar img:hover { transform: scale(1.1); }
    
    /* Mobile Bottom Navigation Fixes */
    @media (max-width: 768px) {
      body {
        padding-right: 0; /* Remove right padding */
        padding-bottom: 70px; /* Add bottom padding so chats don't hide under the nav */
      }
      .sidebar { 
        width: 100%; 
        height: 60px; /* Fixed proper height */
        flex-direction: row; 
        justify-content: center; 
        align-items: center; 
        bottom: 0; 
        top: auto; 
        right: 0; 
        left: 0; 
        padding: 0;
        border-top: 1px solid #ddd; 
      }
      .sidebar .icon { 
        flex-direction: row; 
        justify-content: space-around; 
        margin-top: 0; 
      }
    }
  </style>
</head>

<body>
  <div class="top">Chats</div>

  <div class="chat-list" id="chat-container">
    <div class="empty">Loading chats...</div>
  </div>

  <div class="sidebar">
    <div class="icon">
                <a href="/" aria-label="Home">
        <div class="nav-icon-container">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z" fill="#228B22"/>
          </svg>
        </div>
      </a>
      <a href="/shorts" aria-label="Shorts"><div class="nav-icon-container"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><defs><mask id="reels-cutout"><rect width="24" height="24" fill="white" /><path d="M10 10.5v5l4.5-2.5z" fill="black" /><rect x="0" y="7" width="24" height="1.5" fill="black" /><path d="M7.5 2l-2.5 5h2l2.5-5z" fill="black" /><path d="M14.5 2l-2.5 5h2l2.5-5z" fill="black" /><path d="M21.5 2l-2.5 5h2l2.5-5z" fill="black" /></mask></defs><rect x="2" y="2" width="20" height="20" rx="4" fill="#228B22" mask="url(#reels-cutout)" /></svg></div></a>
      <a href="/friends" aria-label="Chat"><div class="nav-icon-container" style="position: relative; display: inline-flex; width: 24px; height: 24px;"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M12 3c5.5 0 10 3.58 10 8 0 2.5-1.4 4.74-3.55 6.15.3.92 1.05 2.22 1.05 2.22s-1.7.13-3.65-.9c-1.2.35-2.5.53-3.85.53-5.5 0-10-3.58-10-8s4.5-8 10-8z" fill="#228B22"/><circle cx="7.5" cy="11" r="1.5" fill="#ffffff"/><circle cx="12" cy="11" r="1.5" fill="#ffffff"/><circle cx="16.5" cy="11" r="1.5" fill="#ffffff"/></svg><span id="global-chat-badge" class="notification-badge" style="display: none; position: absolute; top: -6px; right: -8px; background-color: #ff3b30; color: white; font-size: 10px; font-weight: bold; font-family: sans-serif; border-radius: 50%; min-width: 16px; height: 16px; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid #ffffff;">0</span>
</div></a>
      <a href="/calender" aria-label="Calendar"><div class="nav-icon-container" style="position: relative; display: inline-flex; width: 24px; height: 24px;"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><defs><linearGradient id="calendarGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#6fc258" /><stop offset="100%" stop-color="#1c6827" /></linearGradient></defs><rect x="3" y="5" width="18" height="17" rx="2" ry="2" fill="url(#calendarGrad)" /><rect x="6.5" y="3" width="2.5" height="4" rx="1" fill="url(#calendarGrad)" /><rect x="15" y="3" width="2.5" height="4" rx="1" fill="url(#calendarGrad)" /><rect x="5" y="9.5" width="2.5" height="2.5" fill="#ffffff" /><rect x="8.5" y="9.5" width="2.5" height="2.5" fill="#ffffff" /><rect x="12" y="9.5" width="2.5" height="2.5" fill="#ffffff" /><rect x="15.5" y="9.5" width="2.5" height="2.5" fill="#ffffff" /><rect x="5" y="13" width="2.5" height="2.5" fill="#ffffff" /><rect x="8.5" y="13" width="2.5" height="2.5" fill="#ffffff" /><rect x="12" y="13" width="2.5" height="2.5" fill="#ffffff" /><rect x="15.5" y="13" width="2.5" height="2.5" fill="#ffffff" /><rect x="5" y="16.5" width="2.5" height="2.5" fill="#ffffff" /><rect x="8.5" y="16.5" width="2.5" height="2.5" fill="#ffffff" /><rect x="12" y="16.5" width="6" height="2.5" fill="#ffffff" /></svg><span class="notification-badge" style="position: absolute; top: -6px; right: -8px; background-color: #ff3b30; color: white; font-size: 10px; font-weight: bold; border-radius: 50%; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid #ffffff;">5</span></div></a>
    </div>
  </div>

  <script>
    async function loadFriends() {
      const container = document.getElementById('chat-container');

      try {
        const response = await fetch('/api/friends');
        
        if (response.status === 401) {
          window.location.href = '/login';
          return;
        }

        if (!response.ok) throw new Error('Failed to fetch data');

        const friends = await response.json();
        container.innerHTML = '';

        // Added Array check to prevent .forEach errors if backend sends wrong data format
        if (!Array.isArray(friends) || friends.length === 0) {
          container.innerHTML = '<div class="empty">No friends yet</div>';
          return;
        }

        friends.forEach(f => {
          // Improved error handling for missing data per user
          const timeString = f.lastMessageAt 
            ? new Date(f.lastMessageAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
            : "";
          
          const unreadHTML = f.unreadCount > 0 
            ? `<span class="unread-badge">${f.unreadCount}</span>` 
            : "";
          
          const onlineHTML = f.isOnline 
            ? `<span class="online-dot"></span>` 
            : "";

          const profilePic = f.picture || '/uploads/profilepic.jpg';
          const lastMessageText = f.lastMessage || "Tap to start chatting";
          const userName = f.name || "Unknown User";

          const card = document.createElement('a');
          card.href = `/chat/${f._id}`;
          card.className = "chat-row";
          
          card.innerHTML = `
            <div class="avatar">
              <img src="${profilePic}" alt="${userName}" onerror="this.src='/uploads/profilepic.jpg'">
              ${onlineHTML}
            </div>
            <div class="chat-info">
              <div class="chat-top">
                <span class="chat-name">${userName}</span>
                <span class="chat-time">${timeString}</span>
              </div>
              <div class="chat-bottom">
                <span class="chat-preview">${lastMessageText}</span>
                ${unreadHTML}
              </div>
            </div>
          `;

          container.appendChild(card);
        });

      } catch (error) {
        console.error("Error loading friends list:", error);
        container.innerHTML = '<div class="empty" style="color:#d93025;">Failed to load chats. Please try again later.</div>';
      }
    }
    

   // Add this to your individual chat room script

async function markMessagesAsRead(friendId) {
  try {
    await fetch('/api/messages/mark-read', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      // Send the ID of the friend whose chat you just opened
      body: JSON.stringify({ friendId: friendId }) 
    });
  } catch (error) {
    console.error("Failed to mark messages as read:", error);
  }
}

// Example of how to call it:
// Assuming you extract the friend's ID from the URL (e.g., /chat/12345)
const currentFriendId = window.location.pathname.split('/').pop(); 

// Call it as soon as the chat room finishes loading
document.addEventListener('DOMContentLoaded', () => {
    markMessagesAsRead(currentFriendId);
});


    window.addEventListener('DOMContentLoaded', loadFriends);
  </script>
</body>
</html>
