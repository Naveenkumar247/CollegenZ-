<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Paste ALL of your CSS from your original code here */
    body { margin: 0; font-family: system-ui, sans-serif; background: #f8f9fa; color: #222; }
    .top { background: #228B22; color: white; padding: 14px; font-size: 18px; font-weight: 600; }
    .chat-list { background: #fff; min-height: 100px; }
    .chat-row { display: flex; gap: 12px; padding: 14px; text-decoration: none; color: #222; border-bottom: 1px solid #eee; align-items: center; }
    .chat-row:hover { background: #f4fdf4; }
    .avatar { position: relative; }
    .avatar img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #228B22; border-radius: 50%; border: 2px solid #fff; }
    .chat-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .chat-top { display: flex; justify-content: space-between; align-items: center; }
    .chat-name { font-weight: 600; font-size: 15px; }
    .chat-time { font-size: 12px; color: #777; }
    .chat-bottom { display: flex; justify-content: space-between; align-items: center; }
    .chat-preview { font-size: 13px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .unread-badge { background: #228B22; color: white; font-size: 11px; font-weight: 600; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .empty { padding: 20px; text-align: center; color: #777; }
    
    /* Sidebar CSS */
    .sidebar { width: 60px; background: #f1f1f1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 1rem 0; position: fixed; top: 0; right: 0; height: 100vh; z-index: 2000; transition: all 0.3s ease-in-out; box-shadow: -2px 0 8px rgba(0,0,0,0.1); }
    .sidebar .icon { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; margin-top: 2rem; }
    .sidebar img { width: 45px; height: 45px; transition: transform 0.2s ease; }
    .sidebar img:hover { transform: scale(1.1); }
    
    @media (max-width: 992px) { .sidebar img { width: 45px; height: 45px; } }
    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 35px; flex-direction: row; justify-content: center; align-items: center; bottom: 0; top: auto; right: 0; left: 0; background: #f1f1f1; border-top: 1px solid #ddd; box-shadow: 0 -2px 8px rgba(0,0,0,0.1); }
      .sidebar .icon { flex-direction: row; justify-content: space-around; width: 100%; gap: 2rem; margin-top: 0; padding: 0 0.5rem; }
      .sidebar img { width: 45px; height: 45px; }
      header { margin-right: 0; margin-bottom: 65px; padding: 0.8rem 1rem; }
    }
    @media (max-width: 480px) { .sidebar .icon { flex-wrap: wrap; } .sidebar img { width: 24px; height: 24px; } }
    @media (max-width: 576px) { main h2 { font-size: 1.4rem; } main p { font-size: 0.9rem; } main .btn { width: 100%; } }
  </style>
</head>

<body>
  <div class="top">Chats</div>

  <div class="chat-list" id="chat-container">
    <div class="empty">Loading chats...</div>
  </div>

  <div class="sidebar">
    <div class="icon">
      <a href="/"><img src="/uploads/home.png" alt="Home"></a>
      <a href="/profile"><img src="/uploads/settings.png" alt="Settings"></a>
      <a href="/friends"><img src="/chaticon.png" alt="post"></a>
      <a href="/calender"><img src="/uploads/calender.png" alt="Calendar"></a>
    </div>
  </div>

  <script>
    // Fetch the data from your new backend API route
    async function loadFriends() {
      const container = document.getElementById('chat-container');

      try {
        const response = await fetch('/api/friends');
        
        // If the user isn't logged in, redirect them
        if (response.status === 401) {
          window.location.href = '/login';
          return;
        }

        if (!response.ok) throw new Error('Failed to fetch data');

        const friends = await response.json();

        // Clear the loading text
        container.innerHTML = '';

        if (!friends || friends.length === 0) {
          container.innerHTML = '<div class="empty">No friends yet</div>';
          return;
        }

        // Loop through the data and build the HTML for each chat row
        friends.forEach(f => {
          const timeString = f.lastMessageAt 
            ? new Date(f.lastMessageAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
            : "";
          
          const unreadHTML = f.unreadCount > 0 
            ? `<span class="unread-badge">${f.unreadCount}</span>` 
            : "";
          
          const onlineHTML = f.isOnline 
            ? `<span class="online-dot"></span>` 
            : "";

          const profilePic = f.picture || '/uploads/profilepic.jpg';

          const card = document.createElement('a');
          card.href = `/chat/${f._id}`;
          card.className = "chat-row";
          
          card.innerHTML = `
            <div class="avatar">
              <img src="${profilePic}" alt="Profile">
              ${onlineHTML}
            </div>
            <div class="chat-info">
              <div class="chat-top">
                <span class="chat-name">${f.name}</span>
                <span class="chat-time">${timeString}</span>
              </div>
              <div class="chat-bottom">
                <span class="chat-preview">${f.lastMessage}</span>
                ${unreadHTML}
              </div>
            </div>
          `;

          container.appendChild(card);
        });

      } catch (error) {
        console.error("Error loading friends list:", error);
        container.innerHTML = '<div class="empty" style="color:red;">Failed to load chats. Please try again.</div>';
      }
    }

    // Run the function when the page loads
    window.addEventListener('DOMContentLoaded', loadFriends);
  </script>
</body>
</html>
